}

// ============================================================================
// Small DOM helper (no framework, just enough to build nodes from code).
// ============================================================================

function h(tag, attrs, ...children) {
    const n = document.createElement(tag);
    if (attrs) {
        for (const [k, v] of Object.entries(attrs)) {
            if (v == null || v === false) continue;
            if (k === "class")            n.className = v;
            else if (k === "html")        n.innerHTML = v;
            else if (k.startsWith("on"))  n.addEventListener(k.slice(2), v);
            else if (k === "checked")     n.checked = !!v;
            else if (k === "value")       n.value = v == null ? "" : v;
            else                          n.setAttribute(k, v);
        }
    }
    for (const c of children.flat()) {
        if (c == null || c === false) continue;
        if (typeof c === "string") n.appendChild(document.createTextNode(c));
        else n.appendChild(c);
    }
    return n;
}
function row(label, ...fields) {
    return h("div", { class: "row" },
        h("label", null, label),
        h("div", { class: "field" }, ...fields)
    );
}
function textInput(value, onInput, placeholder, onBlur) {
    const n = h("input", { type: "text", value: value || "",
        placeholder: placeholder || "",
        oninput: e => { onInput(e.target.value); updatePreview(); } });
    if (onBlur) n.addEventListener("blur", onBlur);
    return n;
}

// Variables available for substitution in title/subtitle fields.
const TITLE_VARS = [
    { token: "{full_name}",     label: "User's full display name" },
    { token: "{console_user}",  label: "Login username" },
    { token: "{computer_name}", label: "Computer name" },
    { token: "{hostname}",      label: "Local hostname" },
    { token: "{serial_number}", label: "Hardware serial" },
    { token: "{model}",         label: "Model identifier" },
    { token: "{os_version}",    label: "macOS version" },
    { token: "{ip_address}",    label: "Primary IP address" },
];

// Insert text at the cursor position of an <input> and fire its oninput.
function insertAtCursor(input, text) {
    const s = input.selectionStart, e = input.selectionEnd;
    input.value = input.value.slice(0, s) + text + input.value.slice(e);
    input.selectionStart = input.selectionEnd = s + text.length;
    input.dispatchEvent(new Event("input"));
    input.focus();
}

// Wrap a textInput with a {…} button that lets the user pick a variable token.
function textInputWithVars(value, onInput, placeholder, onBlur) {
    const input = textInput(value, onInput, placeholder, onBlur);

    const dropdown = h("div", { class: "var-picker-dropdown hidden" });
    TITLE_VARS.forEach(({ token, label }) => {
        dropdown.appendChild(h("div", { class: "var-picker-item",
            onmousedown: e => {
                e.preventDefault(); // keep focus on input
                insertAtCursor(input, token);
                dropdown.classList.add("hidden");
            }
        },
            h("span", { class: "var-token" }, token),
            h("span", { class: "var-label" }, label)
        ));
    });

    const btn = h("button", { class: "var-picker-btn", title: "Insert variable",
        type: "button",
        onclick: e => { e.stopPropagation(); dropdown.classList.toggle("hidden"); }
    }, "{…}");

    // Close on any outside click.
    document.addEventListener("click", () => dropdown.classList.add("hidden"), true);

    return h("div", { class: "var-input-wrap" },
        input,
        h("div", { class: "var-picker-wrap" }, btn, dropdown)
    );
}

function intInput(value, onInput, placeholder) {
    return h("input", { type: "number", min: "0",
        value: value == null ? "" : String(value),
        placeholder: placeholder || "",
        oninput: e => {
            const v = e.target.value === "" ? null : parseInt(e.target.value, 10);
            onInput(Number.isFinite(v) ? v : null); updatePreview();
        } });
}
function checkbox(checked, onChange, label) {
    return h("div", { class: "check-row" },
        h("input", { type: "checkbox", checked: !!checked,
            onchange: e => { onChange(e.target.checked); updatePreview(); } }),
        label ? h("span", null, label) : null
    );
}
function selectInput(value, options, onChange) {
    const opts = options.map(o => {
        const [val, text] = Array.isArray(o) ? o : [o, o];
        const opt = h("option", { value: val }, text);
        if (val === value) opt.selected = true;
        return opt;
    });
    return h("select", { onchange: e => { onChange(e.target.value); updatePreview(); } }, ...opts);
}
// Three-state select for per-window blur/ontop overrides.
// value: null = inherit from global, true = on, false = off
function triStateSelect(value, onChange) {
    return selectInput(
        value === true ? "true" : value === false ? "false" : "",
        [["", "Inherit from global"], ["true", "On"], ["false", "Off"]],
        v => onChange(v === "" ? null : v === "true")

function hint(text) { return h("div", { class: "hint" }, text); }
function btn(label, onClick, cls) {
    return h("button", { class: "btn" + (cls ? " " + cls : ""), onclick: onClick }, label);
}

/**
 * Icon input: plain text field for paths/URLs + an animation picker that
 * appears when the value starts with "SF=". Calls onChange(newValue) on
 * every change; calls updateFn() (e.g. updatePreview or reopenStep) after.
 *
 * Returns a fragment — use spread (...renderIconInput(...)) inside row().
 */
function renderIconInput(value, onChange, updateFn) {
    const sf = parseSFValue(value);
    const inputEl = textInput(value, v => {
        onChange(v);
        if (updateFn) updateFn();
    }, sf ? "SF=symbol.name" : "/path/img.png, https://…, or SF=symbol.name");

    const nodes = [inputEl];

    if (sf) {
        const animSel = h("div", { class: "sf-anim-row" },
            h("span", { class: "sf-anim-label" }, "Animation"),
            h("select", { class: "sf-anim-select",
                onchange: e => {
                    onChange(buildSFValue(sf.name, e.target.value));
                    if (updateFn) updateFn();
                }
            },
                ...SF_ANIMATIONS.map(([val, label]) =>
                    h("option", { value: val, selected: val === sf.animation }, label)
                )
            )
        );
        nodes.push(animSel);
    }

    nodes.push(h("div", { class: "hint" },
        "Local path, https:// URL, or ",
        h("code", null, "SF=symbol.name"),

// ============================================================================
// Validation
// ============================================================================

let _issues = [];

function validateState() {
    const issues = [];
    const nonAddon = state.Playbooks.filter(p => !p.Addon);

    if (state.Playbooks.length === 0) {
        issues.push({ scope: "global", message: "No playbooks defined." });
    }
    if (nonAddon.length > 0 && !state.DefaultPlaybook) {
        issues.push({ scope: "global", message: "No default playbook set (Runtime tab)." });
    }
    if (state.DefaultPlaybook && !nonAddon.find(p => p.Name === state.DefaultPlaybook)) {
        issues.push({ scope: "global", message: `Default playbook "${state.DefaultPlaybook}" not found.` });
    }

    const seenNames = new Set();
    state.Playbooks.forEach((p, pIdx) => {
        if (!p.Name) {
            issues.push({ scope: "playbook", pIdx, message: "Playbook has no name." });
        } else if (seenNames.has(p.Name)) {
            issues.push({ scope: "playbook", pIdx, message: `Duplicate playbook name: "${p.Name}".` });
        } else {
            seenNames.add(p.Name);
        }
        if (p.Steps.length === 0) {
            issues.push({ scope: "playbook", pIdx, message: "Playbook has no steps." });
        }

        const seenIds = new Set();
        p.Steps.forEach((st, sIdx) => {
            const stepIssues = [];
            if (!st.Name) stepIssues.push("No name.");
            if (!st.Id) {
                stepIssues.push("No ID.");
            } else if (seenIds.has(st.Id)) {
                stepIssues.push(`Duplicate step ID "${st.Id}".`);
            } else {
                seenIds.add(st.Id);
            }
            if (st.Action) {
                const a = st.Action;
                if (a.Type === "shell"   && !a.Command) stepIssues.push("Shell action has no command.");
                if (a.Type === "package" && !a.Path)    stepIssues.push("Package action has no path.");
                if (a.Type === "dialog"  && !a.Title)   stepIssues.push("Dialog action has no title.");
                if (a.Type === "dialog"  && !a.Message) stepIssues.push("Dialog action has no message.");
            }
            (st.Conditions || []).forEach((c, ci) => {
                const n = ci + 1;
                if (c.Type === "shell"             && !c.Command)    stepIssues.push(`Condition ${n}: no command.`);
                if (c.Type === "app_installed"     && !c.BundleId && !c.Path) stepIssues.push(`Condition ${n}: needs a bundle ID or path.`);
                if (c.Type === "default_browser"   && !c.BundleId)   stepIssues.push(`Condition ${n}: needs a bundle ID.`);
                if (c.Type === "file_exists"       && !c.Path)       stepIssues.push(`Condition ${n}: needs a path.`);
                if (c.Type === "profile_installed" && !c.Identifier) stepIssues.push(`Condition ${n}: needs an identifier.`);
                if (c.Type === "process_running"   && !c.Name)       stepIssues.push(`Condition ${n}: needs a process name.`);
            });
            stepIssues.forEach(message =>
                issues.push({ scope: "step", pIdx, sIdx, message })
            );
        });
    });
    return issues;
}

function renderValidationBanner(issues) {
    const global = issues.filter(i => i.scope === "global");
    const rest   = issues.filter(i => i.scope !== "global");
    const total  = issues.length;
    const label  = `${total} issue${total === 1 ? "" : "s"} found`;
    const items  = [...global, ...rest].map(i => {
        let prefix = "";
        if (i.scope === "playbook") {
            const p = state.Playbooks[i.pIdx];
            prefix = `Playbook "${p && p.Name || `#${i.pIdx + 1}`}": `;
        } else if (i.scope === "step") {
            const p = state.Playbooks[i.pIdx];
            const s = p && p.Steps[i.sIdx];
            prefix = `"${p && p.Name || `Playbook ${i.pIdx + 1}`}" › step ${i.sIdx + 1}${s && s.Name ? ` "${s.Name}"` : ""}: `;
        }
        return h("li", null, prefix + i.message);
    });
    return h("details", { class: "validation-banner" },
        h("summary", null, label),
        h("ul", null, ...items)
    );
}

function renderCanvas() {
    _issues = validateState();
    // Clamp selected index in case a playbook was deleted.
    if (ui.selectedPlaybook >= state.Playbooks.length) {
        ui.selectedPlaybook = Math.max(0, state.Playbooks.length - 1);
    }
    const root = document.getElementById("canvas");
    root.innerHTML = "";
    root.append(
        renderPlaybookSidebar(),
        renderPlaybookContent(ui.selectedPlaybook)
    );
}

function renderPlaybookSidebar() {
    const collapsed = ui.sidebarCollapsed;
    const sidebar = h("div", { class: "playbook-sidebar" + (collapsed ? " collapsed" : "") });

    // Top row: toggle button (+ settings icon when collapsed)
    const toggleBtn = h("button", {
        class: "sidebar-toggle",
        "data-tooltip": collapsed ? "Expand sidebar" : "Collapse sidebar",
        "data-tooltip-below": "",

    }, collapsed ? "›" : "‹");

    const settingsIconBtn = h("button", {
        class: "sidebar-settings-icon",
        "data-tooltip": "Profile Settings",
        "data-tooltip-below": "",
        onclick: e => openSettingsPopover(e.currentTarget)
    }, "⚙");

    sidebar.appendChild(h("div", { class: "sidebar-top-row" },
        collapsed ? null : h("span", { style: "font-size:11px;font-weight:700;color:#8e8e93;letter-spacing:0.05em;text-transform:uppercase" }, "Playbooks"),
        toggleBtn
    ));

    if (collapsed) {
        sidebar.appendChild(settingsIconBtn);
    } else {
        // Settings button
        const isOpen = ui.settingsOpen;
        sidebar.appendChild(
            h("div", { class: "sidebar-settings-row" },
                h("button", {
                    class: "settings-trigger-btn" + (isOpen ? " active" : ""),
                    "data-tooltip": "Branding, identity, hardware info, help & add-on picker",
                    "data-tooltip-below": "",
                    onclick: e => openSettingsPopover(e.currentTarget)
                },
                    h("span", { class: "stb-icon" }, "⚙"),
                    "Profile Settings",
                    h("span", { class: "stb-caret" }, "▾")
                )
            )
        );
        sidebar.appendChild(h("div", { class: "sidebar-section-label" }, ""));
    }

    const list = h("div", { class: "sidebar-playbook-list" });
    state.Playbooks.forEach((p, idx) => {
        const stepCount = p.Steps.length;
        const issueCount = _issues.filter(i =>
            (i.scope === "playbook" || i.scope === "step") && i.pIdx === idx).length;
        const itemLabel = p.Name || `Playbook ${idx + 1}`;
        const item = h("div", {
            class: "sidebar-item" + (ui.selectedPlaybook === idx ? " active" : ""),
            draggable: "true",
            "data-tooltip": collapsed ? itemLabel : undefined,
            "data-tooltip-below": collapsed ? "" : undefined,
            onclick: () => { ui.selectedPlaybook = idx; renderCanvas(); }
        },
            h("span", { class: "sidebar-item-icon" }, p.Addon ? "📦" : "▶"),
            h("span", { class: "sidebar-item-name" }, itemLabel),
            issueCount ? h("span", { class: "sidebar-item-warn" }, "⚠") : null,
            h("span", { class: "sidebar-item-count" }, String(stepCount))
        );

        item.addEventListener("dragstart", e => {
            e.dataTransfer.setData("application/enrollinator-lane", String(idx));
            e.dataTransfer.effectAllowed = "move";
            item.classList.add("dragging");
        });
        item.addEventListener("dragend", () => item.classList.remove("dragging"));
        item.addEventListener("dragover", e => {
            if (e.dataTransfer.types.includes("application/enrollinator-lane")) {
                e.preventDefault(); item.classList.add("drag-over");
            } else if (e.dataTransfer.types.includes("application/enrollinator-step")) {
                // Don't allow dropping a step onto its own playbook.
                e.preventDefault(); item.classList.add("step-drop-over");
            }
        });
        item.addEventListener("dragleave", () => item.classList.remove("drag-over", "step-drop-over"));
        item.addEventListener("drop", e => {
            item.classList.remove("drag-over", "step-drop-over");
            // Reorder playbooks
            if (e.dataTransfer.types.includes("application/enrollinator-lane")) {
                const raw = e.dataTransfer.getData("application/enrollinator-lane");
                if (!raw) return;
                e.preventDefault();
                const from = parseInt(raw, 10);
                if (from === idx) return;
                const moved = state.Playbooks.splice(from, 1)[0];
                state.Playbooks.splice(idx, 0, moved);
                if (ui.selectedPlaybook === from) ui.selectedPlaybook = idx;
                renderCanvas(); updatePreview();
                return;
            }
            // Move step to this playbook (appended at end)
            const raw = e.dataTransfer.getData("application/enrollinator-step");
            if (!raw) return;
            e.preventDefault();
            const { from, idx: sIdx } = JSON.parse(raw);
            if (from === idx) return; // same playbook — ignore, handled by step-row drop
            moveStep(from, sIdx, idx, state.Playbooks[idx].Steps.length);
            ui.selectedPlaybook = idx; // switch view to destination
        });

        list.appendChild(item);
    });
    sidebar.appendChild(list);

    sidebar.appendChild(h("button", {
        class: "sidebar-add-btn",
        "data-tooltip": collapsed ? "Add playbook" : undefined,
        "data-tooltip-below": "",
        onclick: () => {
            state.Playbooks.push(blankProfile());
            ui.selectedPlaybook = state.Playbooks.length - 1;
            renderCanvas(); updatePreview();
        }
    },
        "+",
        h("span", { class: "sidebar-add-btn-label" }, " Add playbook")
    ));

    return sidebar;
}

function renderPlaybookContent(pIdx) {
    const content = h("div", { class: "playbook-content" });

    if (state.Playbooks.length === 0) {
        content.appendChild(h("div", { class: "empty-state" },
            "No playbooks yet — click '+ Add playbook' in the sidebar."));
        return content;
    }

    const profile = state.Playbooks[pIdx];
    if (!profile) return content;

    // Show global issues + issues for this playbook only.
    const relevant = _issues.filter(i =>
        i.scope === "global" || ((i.scope === "playbook" || i.scope === "step") && i.pIdx === pIdx));
    if (relevant.length) content.appendChild(renderValidationBanner(relevant));

    // Playbook header
    const isDefault = state.DefaultPlaybook === profile.Name;
    content.appendChild(h("div", { class: "playbook-content-header" },
        h("div", { class: "playbook-content-title" },
            h("span", null, profile.Name || `Playbook ${pIdx + 1}`),
            isDefault ? h("span", { class: "pill default" }, "default") : null,
            profile.TestMode ? h("span", { class: "pill test-mode" }, "test mode") : null,
            profile.Addon ? h("span", { class: "pill addon" }, "addon") : null
        ),
        h("div", { class: "playbook-content-actions" },
            btn("Edit", () => openProfileEditor(pIdx)),
            btn("Duplicate", () => {
                state.Playbooks.splice(pIdx + 1, 0, JSON.parse(JSON.stringify(profile)));
                renderCanvas(); updatePreview();
            }),
            btn("Delete", () => {
                if (!confirm(`Delete playbook "${profile.Name || "untitled"}"?`)) return;
                state.Playbooks.splice(pIdx, 1);
                renderCanvas(); updatePreview();
            }, "danger")
        )
    ));

    function addStep() {
        const st = blankStep();
        st.Id = `step-${profile.Steps.length + 1}`;
        st.Name = "New step";
        profile.Steps.push(st);
        const newIdx = profile.Steps.length - 1;
        ui.pendingStep = { pIdx, sIdx: newIdx };
        openStepEditor(pIdx, newIdx);
    }

    if (profile.Steps.length === 0) {
        content.appendChild(h("div", { class: "step-list-empty-cta", onclick: addStep },
            h("div", { class: "cta-icon" }, "＋"),
            h("div", { class: "cta-title" }, "Add your first step"),
            h("div", { class: "cta-sub" }, "Click here to add a step and get started")
        ));
    } else {
        content.appendChild(renderStepList(profile, pIdx));
        content.appendChild(h("div", { style: "display:flex;justify-content:center;" },
            h("button", { class: "step-list-add",
                "data-tooltip": "Add a new step to this playbook",
                onclick: addStep
            }, "+ Add step")
        ));
    }

    return content;
}

function insertStepAt(profile, pIdx, insertIdx) {
    const st = blankStep();
    st.Id   = `step-${profile.Steps.length + 1}`;
    st.Name = "New step";
    profile.Steps.splice(insertIdx, 0, st);
    ui.pendingStep = { pIdx, sIdx: insertIdx };
    openStepEditor(pIdx, insertIdx);
}

function renderStepInsertBtn(profile, pIdx, insertIdx) {
    return h("div", { class: "step-insert" },
        h("button", {
            class: "step-insert-btn",
            "data-tooltip": "Insert step here",
            onclick: e => { e.stopPropagation(); insertStepAt(profile, pIdx, insertIdx); }
        }, "+")
    );
}

function renderStepList(profile, pIdx) {
    const list = h("div", { class: "step-list" });
    if (profile.Steps.length === 0) return list;

    profile.Steps.forEach((st, sIdx) => {
        list.appendChild(renderStepRow(st, pIdx, sIdx));
        const branchKey = `${pIdx}:${sIdx}`;
        if (st.OnSuccess || st.OnFailure || ui.expandedBranches.has(branchKey)) {
            list.appendChild(renderBranchBlock(st, pIdx, sIdx, profile.Steps));
        }
        // Insert button between this step and the next.
        if (sIdx < profile.Steps.length - 1) {
            list.appendChild(renderStepInsertBtn(profile, pIdx, sIdx + 1));
        }
    });

    // Drop onto empty area at end of list.
    list.addEventListener("dragover", e => {
        if (e.dataTransfer.types.includes("application/enrollinator-step")) e.preventDefault();
    });
    list.addEventListener("drop", e => {
        const raw = e.dataTransfer.getData("application/enrollinator-step");
        if (!raw) return;
        e.preventDefault();
        const { from, idx } = JSON.parse(raw);
        moveStep(from, idx, pIdx, profile.Steps.length);
    });

    return list;
}

const SETTINGS_TABS = [
    { id: "identity", label: "Playbook Identity" },
    { id: "branding", label: "Branding" },
    { id: "runtime",  label: "Runtime" },
    { id: "hardware", label: "Hardware Info" },
    { id: "help",     label: "Help" },
    { id: "addons",   label: "Add-on Picker" },
];

function openSettingsPopover(triggerEl) {
    if (ui.settingsOpen) {
        closeSettingsPopover();
        return;
    }
    ui.settingsOpen = true;
    renderCanvas(); // refresh button active state

    const canvas = document.getElementById("canvas");
    const cr = canvas.getBoundingClientRect();
    const width = 530;
    const left = cr.left + (cr.width - width) / 2;
    const top  = cr.top + 20;

    const backdrop = h("div", { class: "popover-backdrop", onclick: closeSettingsPopover });

    const tabBar = h("div", { class: "popover-tab-bar", id: "settings-tab-bar" },
        ...SETTINGS_TABS.map(t =>
            h("button", {
                class: "popover-tab" + (ui.settingsTab === t.id ? " active" : ""),
                "data-tab": t.id,
                onclick: () => {
                    ui.settingsTab = t.id;
                    document.querySelectorAll("#settings-tab-bar .popover-tab")
                        .forEach(el => el.classList.toggle("active", el.dataset.tab === t.id));
                    renderSettingsBody();
                }
            }, t.label)
        )
    );

    const body = h("div", { class: "popover-body", id: "settings-popover-body" });

    const popover = h("div", { class: "settings-popover" }, tabBar, body);
    popover.style.left = left + "px";
    popover.style.top  = top  + "px";

    const root = document.getElementById("popover-root");
    root.innerHTML = "";
    root.append(backdrop, popover);
    renderSettingsBody();
}

function closeSettingsPopover() {
    ui.settingsOpen = false;
    document.getElementById("popover-root").innerHTML = "";
    renderCanvas(); // refresh button active state
}

function reopenSettings() {
    if (!ui.settingsOpen) return;
    renderSettingsBody();
}

function renderSettingsBody() {
    const body = document.getElementById("settings-popover-body");
    if (!body) return;
    body.innerHTML = "";
    switch (ui.settingsTab) {
        case "identity": body.appendChild(renderIdentityTile()); break;
        case "branding": body.appendChild(renderBrandingTile()); break;
        case "runtime":  body.appendChild(renderRuntimeTile()); break;
        case "hardware": body.appendChild(renderHardwareInfoTile()); break;
        case "help":     body.appendChild(renderHelpTile()); break;
        case "addons":   body.appendChild(renderAddonPickerTile()); break;
    }
}

// Renders an optional path field. Shows a dashed "+ Add" button when the
// value is empty and the field hasn't been explicitly expanded; once open,
// shows the text input with a Remove button to collapse it again.
function optionalTextRow(label, key, value, onUpdate, placeholder, hintText) {
    const isOpen = !!(value) || ui.expandedOptional.has(key);
    if (isOpen) {
        return row(label,
            h("div", { class: "inline-color" },
                textInput(value, v => { onUpdate(v); updatePreview(); }, placeholder),
                h("button", { class: "btn-secondary", onclick: () => {
                    onUpdate("");
                    ui.expandedOptional.delete(key);
                    updatePreview(); reopenSettings();
                }}, "Remove")
            ),
            ...(hintText ? [hint(hintText)] : [])
        );
    }
    return row(label,
        h("button", { class: "optional-add-btn", onclick: () => {
            ui.expandedOptional.add(key);
            reopenSettings();
        }}, "+ Add")
    );
}

/** Like optionalTextRow but uses renderIconInput so SF= fields get the animation picker. */
function optionalIconRow(label, key, value, onUpdate) {
    const isOpen = !!(value) || ui.expandedOptional.has(key);
    if (isOpen) {
        const removeBtn = h("button", { class: "btn-secondary", style: "flex-shrink:0", onclick: () => {
            onUpdate("");
            ui.expandedOptional.delete(key);
            updatePreview(); reopenSettings();
        }}, "Remove");
        const inputNodes = renderIconInput(value, v => { onUpdate(v); updatePreview(); }, reopenSettings);
        // Wrap text input + remove button on the same line, hints below.
        const [inputEl, ...extra] = inputNodes;
        const firstLine = h("div", { class: "inline-color" }, inputEl, removeBtn);
        return row(label, firstLine, ...extra);
    }
    return row(label,
        h("button", { class: "optional-add-btn", onclick: () => {
            ui.expandedOptional.add(key);
            reopenSettings();
        }}, "+ Add")
    );
}

function renderHardwareInfoTile() {
    const hw = state.HardwareInfo;
    const tile = h("div", { class: "tile" }, h("h3", null, "Hardware info"));
    tile.append(
        h("p", { class: "tile-desc" }, "Shows a key–value panel next to the step list during onboarding — useful when a user needs to read their serial number to IT over the phone."),
        row("Enabled",
            checkbox(hw.Enabled, v => {
                hw.Enabled = v;
                reopenSettings(); updatePreview();
            }, "Show a hardware info panel beside the step list"))
    );
    if (hw.Enabled) {
        const grid = h("div", { style: "display:grid;grid-template-columns:1fr 1fr;gap:4px" });
        for (const [token, label] of HARDWARE_FIELDS) {
            const isOn = hw.Fields.includes(token);
            grid.appendChild(h("label", { class: "check-row",
                style: "gap:6px;font-size:12px;color:#1d1d1f" },
                h("input", { type: "checkbox", checked: isOn,
                    onchange: e => {
                        if (e.target.checked) {

                            hw.Fields = hw.Fields.filter(x => x !== token);
                        }
                        updatePreview();
                    } }),
                h("span", null, label)));
        }
        tile.append(row("Fields", grid,
            hint("Shown in the order checked here. Uncheck all to hide the panel.")));

    return tile;

// ============================================================================
// Canvas: lanes (one per profile) with draggable step cubes.
// ============================================================================

function renderStepRow(step, pIdx, sIdx) {
    const stepRow = h("div", { class: "step-row", draggable: "true",
        onclick: () => openStepEditor(pIdx, sIdx) });
    stepRow.dataset.pidx = String(pIdx);
    stepRow.dataset.sidx = String(sIdx);

    stepRow.appendChild(h("span", { class: "step-row-handle",
        "data-tooltip": "Drag to reorder · drop onto a sidebar playbook to move",
        onclick: e => e.stopPropagation() }, "⋮⋮"));

    stepRow.appendChild(h("span", { class: "step-row-num" }, String(sIdx + 1)));

    // Icon
    const icon = h("div", { class: "step-row-icon" });
    if (step.Icon) {
        if (/^https?:\/\//i.test(step.Icon)) {
            icon.appendChild(h("img", { src: step.Icon, alt: "" }));
        } else if (/^SF=/i.test(step.Icon)) {
            icon.textContent = "􀀳";
            icon.title = step.Icon;
        } else {
            icon.textContent = "📦";
            icon.title = step.Icon;
        }
    } else {
        icon.textContent = (step.Name || step.Id || "?").trim().charAt(0).toUpperCase() || "?";
    }
    stepRow.appendChild(icon);

    // Body
    const body = h("div", { class: "step-row-body" });
    body.appendChild(h("div", { class: "step-row-name" }, step.Name || "(unnamed step)"));

    const meta = h("div", { class: "step-row-meta" });
    meta.appendChild(h("span", { class: "step-row-id" }, step.Id || "no id"));

    const badges = h("div", { class: "cube-badges" });
    if (step.Action) badges.appendChild(h("span", { class: "tag action" }, step.Action.Type));
    if (step.Conditions && step.Conditions.length)
        badges.appendChild(h("span", { class: "tag conds" },
            `${step.Conditions.length} cond${step.Conditions.length === 1 ? "" : "s"}`));
    if (step.Blocking) badges.appendChild(h("span", { class: "tag blocking" }, "blocking"));
    meta.appendChild(badges);

    const stepErrors = _issues.filter(i => i.scope === "step" && i.pIdx === pIdx && i.sIdx === sIdx);
    if (stepErrors.length) {
        stepRow.classList.add("has-error");
        meta.appendChild(h("span", {
            class: "step-row-error-badge",
            title: stepErrors.map(e => e.message).join("\n")
        }, `⚠ ${stepErrors.length}`));
    }

    body.appendChild(meta);
    stepRow.appendChild(body);

    // Actions
    const actions = h("div", { class: "step-row-actions",
        onclick: e => e.stopPropagation() });
    const branchKey = `${pIdx}:${sIdx}`;
    const branchActive = !!(step.OnSuccess || step.OnFailure) || ui.expandedBranches.has(branchKey);
    actions.appendChild(h("button", {
        class: "btn" + (branchActive ? " branch-btn-active" : ""),
        "data-tooltip": branchActive ? "Branch is set" : "Add if/else branch",
        onclick: e => {
            e.stopPropagation();
            if (branchActive && !step.OnSuccess && !step.OnFailure) {
                ui.expandedBranches.delete(branchKey);
            } else {
                ui.expandedBranches.add(branchKey);
            }
            renderCanvas();
        } }, "⎇"));
    actions.appendChild(h("button", { class: "btn", "data-tooltip": "Duplicate step",
        onclick: e => {
            e.stopPropagation();
            const copy = JSON.parse(JSON.stringify(step));
            if (copy.Id) copy.Id = copy.Id + "-copy";
            if (copy.Name) copy.Name = copy.Name + " (copy)";
            state.Playbooks[pIdx].Steps.splice(sIdx + 1, 0, copy);
            renderCanvas(); updatePreview();
        } }, "⎘"));
    actions.appendChild(h("button", { class: "btn danger", "data-tooltip": "Delete step",
        onclick: e => {
            e.stopPropagation();
            state.Playbooks[pIdx].Steps.splice(sIdx, 1);
            renderCanvas(); updatePreview();
        } }, "✕"));
    stepRow.appendChild(actions);

    // Drag source
    stepRow.addEventListener("dragstart", e => {
        e.stopPropagation();
        e.dataTransfer.setData("application/enrollinator-step",
            JSON.stringify({ from: pIdx, idx: sIdx }));
        e.dataTransfer.effectAllowed = "move";
        stepRow.classList.add("dragging");
    });
    stepRow.addEventListener("dragend", () => {
        stepRow.classList.remove("dragging", "drop-before", "drop-after");
        document.querySelectorAll(".step-row.drop-before, .step-row.drop-after")
            .forEach(r => r.classList.remove("drop-before", "drop-after"));
    });

    // Drop target — top/bottom half = before/after
    stepRow.addEventListener("dragover", e => {
        if (!e.dataTransfer.types.includes("application/enrollinator-step")) return;
        e.preventDefault(); e.stopPropagation();
        const rect = stepRow.getBoundingClientRect();
        const before = (e.clientY - rect.top) < rect.height / 2;
        stepRow.classList.toggle("drop-before", before);
        stepRow.classList.toggle("drop-after", !before);
    });
    stepRow.addEventListener("dragleave", () => {
        stepRow.classList.remove("drop-before", "drop-after");
    });
    stepRow.addEventListener("drop", e => {
        const raw = e.dataTransfer.getData("application/enrollinator-step");
        if (!raw) return;
        e.preventDefault(); e.stopPropagation();
        const rect = stepRow.getBoundingClientRect();
        const before = (e.clientY - rect.top) < rect.height / 2;
        stepRow.classList.remove("drop-before", "drop-after");
        const { from, idx } = JSON.parse(raw);
        moveStep(from, idx, pIdx, sIdx + (before ? 0 : 1));
    });

    return stepRow;
}

// Move a step from {fromPIdx, fromSIdx} to {toPIdx, toSIdx-ish}.
// The target index is interpreted as the index AFTER removal of the source.
function moveStep(fromPIdx, fromSIdx, toPIdx, toSIdx) {
    const src = state.Playbooks[fromPIdx];
    const dst = state.Playbooks[toPIdx];
    if (!src || !dst) return;
    const [moved] = src.Steps.splice(fromSIdx, 1);
    if (fromPIdx === toPIdx && toSIdx > fromSIdx) toSIdx--;
    dst.Steps.splice(toSIdx, 0, moved);
    renderCanvas(); updatePreview();
}

function closeModal() {
    if (ui.pendingStep) {
        const { pIdx, sIdx } = ui.pendingStep;
        state.Playbooks[pIdx].Steps.splice(sIdx, 1);
        ui.pendingStep = null;
    }
    document.getElementById("modal-root").innerHTML = "";

}

function openModal(titleNode, bodyNode, footerNode) {
    const root = document.getElementById("modal-root");
    root.innerHTML = "";
    const backdrop = h("div", { class: "modal-backdrop",
        onclick: e => { if (e.target === backdrop) closeModal(); } });

        h("div", { class: "modal-body" }, bodyNode),
        h("div", { class: "modal-footer" }, footerNode || h("span"))

    backdrop.appendChild(modal);
    root.appendChild(backdrop);
}

// ============================================================================
// Modal: step editor — tabbed (Info / Action / Conditions / Behavior)
// ============================================================================

const STEP_TABS = [
    { id: "info",       label: "Info" },
    { id: "action",     label: "Action" },
    { id: "conditions", label: "Conditions" },
    { id: "behavior",   label: "Behavior" },
];

function openStepEditor(pIdx, sIdx) {
    const p = state.Playbooks[pIdx];
    const st = p.Steps[sIdx];
    if (!st) return;
    ui.openStep = { pIdx, sIdx };
    ui.stepTab = "info";
    // Clone into draft on a fresh open. reopenStep() may call back here when
    // the modal DOM was torn down; preserve any edits already in the draft.
    if (!ui.draftStep) ui.draftStep = deepClone(st);

    const root = document.getElementById("modal-root");
    root.innerHTML = "";

    const draft = ui.draftStep;
    const tabBar = h("div", { class: "modal-tab-bar" },
        ...STEP_TABS.map(t => {
            let badge = null;
            if (t.id === "action" && draft.Action)
                badge = h("span", { class: "tab-badge" }, draft.Action.Type);
            if (t.id === "conditions" && draft.Conditions.length)
                badge = h("span", { class: "tab-badge" }, String(draft.Conditions.length));
            return h("button", {
                class: "modal-tab" + (ui.stepTab === t.id ? " active" : ""),
                "data-tab": t.id,
                onclick: () => {
                    ui.stepTab = t.id;
                    document.querySelectorAll(".modal-tab-bar .modal-tab")
                        .forEach(el => el.classList.toggle("active", el.dataset.tab === t.id));
                    renderStepBody();
                }
            }, t.label, badge);
        })
    );

    const body = h("div", { class: "modal-body", id: "step-modal-body" });

    const modal = h("div", { class: "modal" },
        h("div", { class: "modal-header" },
            h("div", { class: "modal-title" },
                "Step",
                h("span", { class: "pill" }, draft.Name || draft.Id || `#${sIdx + 1}`)
            ),
            h("button", { class: "btn", onclick: closeModal }, "Close")
        ),
        tabBar,
        body,
        h("div", { class: "modal-footer" },
            btn("Delete step", () => {
                if (!confirm(`Delete step "${draft.Name || draft.Id || "untitled"}"?`)) return;
                ui.pendingStep = null; // prevent closeModal from double-removing
                ui.draftStep = null;
                p.Steps.splice(sIdx, 1);
                closeModal(); renderCanvas(); updatePreview();
            }, "danger"),
            btn("Done", () => {
                // Commit draft → live state.
                const { pIdx: _pi, sIdx: _si } = ui.openStep;
                state.Playbooks[_pi].Steps[_si] = deepClone(ui.draftStep);
                ui.draftStep = null;
                ui.pendingStep = null;
                closeModal(); renderCanvas(); updatePreview();
            }, "primary")
        )
    );

    const backdrop = h("div", { class: "modal-backdrop" });
    backdrop.appendChild(modal);
    root.appendChild(backdrop);
    renderStepBody();
}

function renderStepBody() {
    if (!ui.openStep || !ui.draftStep) return;
    const st = ui.draftStep;
    const body = document.getElementById("step-modal-body");
    if (!body) return;
    body.innerHTML = "";
    switch (ui.stepTab) {
        case "info":       body.appendChild(renderStepInfoTab(st)); break;
        case "action":     body.appendChild(renderStepActionTab(st)); break;
        case "conditions": body.appendChild(renderStepConditionsTab(st)); break;
        case "behavior":   body.appendChild(renderStepBehaviorTab(st)); break;
    }
    // Refresh tab badges from the draft.
    document.querySelectorAll(".modal-tab-bar .modal-tab").forEach(el => {
        const tid = el.dataset.tab;
        let badge = el.querySelector(".tab-badge");
        if (tid === "action") {
            if (st.Action && !badge) {
                badge = h("span", { class: "tab-badge" }, st.Action.Type);
                el.appendChild(badge);
            } else if (st.Action && badge) {
                badge.textContent = st.Action.Type;
            } else if (!st.Action && badge) {
                badge.remove();
            }
        }
        if (tid === "conditions") {
            if (st.Conditions.length && !badge) {
                badge = h("span", { class: "tab-badge" }, String(st.Conditions.length));
                el.appendChild(badge);
            } else if (st.Conditions.length && badge) {
                badge.textContent = String(st.Conditions.length);
            } else if (!st.Conditions.length && badge) {
                badge.remove();
            }
        }
    });
}

function reopenStep() {
    if (!ui.openStep) return;
    if (document.getElementById("step-modal-body")) {
        renderStepBody();
        return;
    }
    const { pIdx, sIdx } = ui.openStep;
    openStepEditor(pIdx, sIdx);
}

// ---- Inline branch block rendered in the flow --------------------------------

function renderBranchBlock(st, pIdx, sIdx, steps) {
    const branchKey = `${pIdx}:${sIdx}`;

    function makeSelect(currentValue, opts) {
        // opts: array of { value, label, group? }
        const sel = h("select", { class: "branch-inline-select" });
        let grp = null;
        opts.forEach(o => {
            if (o.group !== undefined) {
                grp = document.createElement("optgroup");
                grp.label = o.group;
                sel.appendChild(grp);
                return;
            }
            const opt = document.createElement("option");
            opt.value = o.value;
            opt.textContent = o.label;
            (grp || sel).appendChild(opt);
        });
        sel.value = currentValue || "";
        return sel;
    }

    function stepOptions(skipSelf) {
        const opts = [];
        opts.push({ group: "Jump to step" });
        steps.forEach((s, i) => {
            if (i === skipSelf) return;
            opts.push({
                value: s.Id || `step-${i}`,
                label: `${i + 1}. ${s.Name || s.Id || `(step ${i + 1})`}`
            });
        });
        return opts;
    }

    // Success select: default = next step
    const successOpts = [
        { value: "", label: "▶ Continue to next step" },
        { value: "$end", label: "⏹ End run" },
        ...stepOptions(sIdx)
    ];
    const successSel = makeSelect(st.OnSuccess, successOpts);
    successSel.addEventListener("change", e => {
        st.OnSuccess = e.target.value;
        if (st.OnSuccess || st.OnFailure) ui.expandedBranches.add(branchKey);
        renderCanvas(); updatePreview();
    });

    const failureOpts = [
        { value: "",         label: "⛔ Stop run" },
        { value: "$end",     label: "⏹ End run" },
        { value: "$next",    label: "▶ Continue to next step" },
        ...stepOptions(sIdx)
    ];
    const failureSel = makeSelect(st.OnFailure, failureOpts);
    failureSel.addEventListener("change", e => {
        st.OnFailure = e.target.value;
        if (st.OnSuccess || st.OnFailure) ui.expandedBranches.add(branchKey);
        renderCanvas(); updatePreview();
    });

    function removeBtn() {
        return h("button", {
            class: "branch-remove-btn",
            title: "Remove branch",
            onclick: e => {
                e.stopPropagation();
                st.OnSuccess = "";
                st.OnFailure = "";
                ui.expandedBranches.delete(branchKey);
                renderCanvas(); updatePreview();
            }
        }, "✕");
    }

    return h("div", { class: "branch-block" },
        h("div", { class: "branch-block-spine" }),
        h("div", { class: "branch-block-body" },
            h("div", { class: "branch-block-header" },
                h("span", { class: "branch-block-title" }, "⎇ If / Else"),
                h("span", { class: "branch-block-subtitle" }, "Choose where to go based on this step's outcome"),
                removeBtn()
            ),
            h("div", { class: "branch-row success" },
                h("span", { class: "branch-row-label success" }, "✓ If succeeds"),
                successSel
            ),
            h("div", { class: "branch-row failure" },
                h("span", { class: "branch-row-label failure" }, "✗ If fails"),
                failureSel
            )
        )
    );
}

function actionFields(a) {
    if (a.Type === "noop") {
        return [hint("The noop action always succeeds — useful for condition-only steps.")];
    }
    if (a.Type === "shell") {
        // Infer MDM/verb from existing command on first render
        if (a._mdmId === undefined) {
            const match = inferMdmSelection(a.Command);
            if (match) {
                a._mdmId = match.mdmId;
                a._verbId = match.verbId;
                a._fields = match.fields;
            } else {
                a._mdmId = a.Command ? "custom" : null;
                a._verbId = null;
                a._fields = {};
            }
        }

        const rows = [];
        const mdmOptions = [["", "— Select MDM / source —"], ...MDM_PRESETS.map(m => [m.id, m.label])];
        rows.push(row("MDM / source",
            selectInput(a._mdmId || "", mdmOptions, v => {
                a._mdmId = v || null;
                a._verbId = null;
                a._fields = {};
                if (!v || v === "custom") {
                    a.Command = "";
                    a.TimeoutSeconds = null;
                } else {
                    const mdm = MDM_PRESETS.find(m => m.id === v);
                    if (mdm && mdm.verbs.length === 1) {
                        a._verbId = mdm.verbs[0].id;
                        a.TimeoutSeconds = mdm.verbs[0].timeout;
                        a.Command = assembleMdmCommand(mdm.verbs[0], {});
                    }
                }
                reopenStep(); updatePreview();
            })
        ));

        const activeMdm = MDM_PRESETS.find(m => m.id === a._mdmId);

        if (activeMdm && activeMdm.id !== "custom" && activeMdm.verbs.length > 0) {
            const verbOptions = [["", "— Select action —"], ...activeMdm.verbs.map(v => [v.id, v.label])];
            rows.push(row("Action",
                selectInput(a._verbId || "", verbOptions, v => {
                    a._verbId = v || null;
                    a._fields = {};
                    const verb = activeMdm.verbs.find(vb => vb.id === v);
                    if (verb) {
                        a.TimeoutSeconds = verb.timeout;
                        a.Command = assembleMdmCommand(verb, {});
                    } else {
                        a.Command = "";
                    }
                    reopenStep(); updatePreview();
                })
            ));
        }

        const activeVerb = activeMdm && activeMdm.verbs.find(v => v.id === a._verbId);

        if (activeVerb && activeVerb.fields.length > 0) {
            if (!a._fields) a._fields = {};
            for (const f of activeVerb.fields) {
                rows.push(row(f.label,
                    textInput(a._fields[f.key] || "", v => {
                        if (!a._fields) a._fields = {};
                        a._fields[f.key] = v;
                        a.Command = assembleMdmCommand(activeVerb, a._fields);
                        updatePreview();
                    }, f.placeholder)
                ));
            }
        }

        if (activeVerb && activeVerb.note) {
            rows.push(hint(activeVerb.note));
        }

        if (!activeMdm || activeMdm.id === "custom") {
            rows.push(row("Command",
                h("textarea", { oninput: e => { a.Command = e.target.value; updatePreview(); } }, a.Command || ""),
                hint("Passed to /bin/sh -c.")
            ));
        } else if (a.Command) {
            rows.push(row("Command",
                h("div", { class: "command-preview" }, a.Command)
            ));
        }

        const runAsChecked = !!(a.RunAsUser);
        rows.push(row("Run as user",
            h("div", { style: "display:flex;flex-direction:column;gap:6px" },
                h("label", { style: "display:flex;align-items:center;gap:7px;cursor:pointer" },
                    h("input", { type: "checkbox", checked: runAsChecked,
                        onchange: e => {
                            a.RunAsUser = e.target.checked ? "$CONSOLE_USER" : "";
                            reopenStep();
                        }
                    }),
                    h("span", { style: "font-size:12.5px" }, "Run as a different user")
                ),
                ...(runAsChecked ? [textInput(a.RunAsUser, v => { a.RunAsUser = v; }, "$CONSOLE_USER")] : [])
            ),
            hint("Default: runs as root (the script user). Check to run as the console user or a named account.")
        ));
        rows.push(row("Timeout (s)", intInput(a.TimeoutSeconds, v => a.TimeoutSeconds = v, "300")));
        return rows;
    }
    if (a.Type === "package") {
        return [
            row("Path",   textInput(a.Path, v => a.Path = v, "/Library/Enrollinator/packages/GoogleChrome.pkg")),
            row("Target", textInput(a.Target, v => a.Target = v, "/")),
            row("Timeout (s)", intInput(a.TimeoutSeconds, v => a.TimeoutSeconds = v, "600"))
        ];
    }
    if (a.Type === "wait") {
        return [
            row("Duration (s)",
                intInput(a.DurationSeconds, v => a.DurationSeconds = v, "10"),
                hint("Sleeps for this long, then succeeds. Good for letting a LaunchDaemon settle."))
        ];
    }
    if (a.Type === "dialog") {
        // Buttons editor — up to 3 pipe-delimited labels.
        const buttonsWrap = h("div", { style: "display:flex;flex-direction:column;gap:4px" });
        const buttons = Array.isArray(a.Buttons) ? a.Buttons : [];
        buttons.forEach((label, i) => {
            buttonsWrap.appendChild(h("div",
                { style: "display:flex;gap:6px;align-items:center" },
                h("input", { type: "text", value: label,
                    placeholder: `Button ${i + 1}`,
                    style: "flex:1",
                    oninput: e => {
                        buttons[i] = e.target.value;
                        if (!buttons.includes(a.ExpectedButton)) {
                            a.ExpectedButton = buttons[0] || "";
                        }
                        updatePreview();
                    } }),
                btn("↑", () => { move(buttons, i, -1); reopenStep(); }, "icon"),
                btn("↓", () => { move(buttons, i,  1); reopenStep(); }, "icon"),
                btn("✕", () => {
                    buttons.splice(i, 1);
                    if (!buttons.includes(a.ExpectedButton)) {
                        a.ExpectedButton = buttons[0] || "";
                    }
                    reopenStep(); updatePreview();
                }, "danger")
            ));
        });
        if (buttons.length < 3) {
            buttonsWrap.appendChild(btn("+ Add button", () => {
                buttons.push("");
                if (!a.Buttons) a.Buttons = buttons;
                reopenStep();
            }));
        }
        return [
            row("Title",   textInput(a.Title, v => a.Title = v, "Acceptable use policy")),
            row("Message",
                h("textarea", {
                    oninput: e => { a.Message = e.target.value; updatePreview(); },
                    placeholder: "Markdown body"
                }, a.Message || "")),
            row("Font sizes",
                h("div", { style: "display:flex;gap:8px;align-items:center" },
                    h("span", { style: "font-size:11px;color:#8e8e93;white-space:nowrap" }, "Title"),
                    h("input", { type: "number", min: "0", style: "width:58px",
                        value: a.TitleFontSize == null ? "" : String(a.TitleFontSize), placeholder: "def",
                        oninput: e => { const v = parseInt(e.target.value, 10); a.TitleFontSize = Number.isFinite(v) ? v : null; updatePreview(); } }),
                    h("span", { style: "font-size:11px;color:#8e8e93;white-space:nowrap;margin-left:4px" }, "Body"),
                    h("input", { type: "number", min: "0", style: "width:58px",
                        value: a.MessageFontSize == null ? "" : String(a.MessageFontSize), placeholder: "14",
                        oninput: e => { const v = parseInt(e.target.value, 10); a.MessageFontSize = Number.isFinite(v) ? v : null; updatePreview(); } })
                )
            ),
            row("Size",
                h("div", { style: "display:flex;gap:8px;align-items:center" },
                    h("span", { style: "font-size:11px;color:#8e8e93;white-space:nowrap" }, "W"),
                    h("input", { type: "number", min: "0", style: "width:62px",
                        value: a.Width == null ? "" : String(a.Width), placeholder: "520",
                        oninput: e => { const v = parseInt(e.target.value, 10); a.Width = Number.isFinite(v) ? v : null; updatePreview(); } }),
                    h("span", { style: "font-size:11px;color:#8e8e93;white-space:nowrap;margin-left:4px" }, "H"),
                    h("input", { type: "number", min: "0", style: "width:62px",
                        value: a.Height == null ? "" : String(a.Height), placeholder: "300",
                        oninput: e => { const v = parseInt(e.target.value, 10); a.Height = Number.isFinite(v) ? v : null; updatePreview(); } })
                )
            ),
            row("Buttons", buttonsWrap, hint("1–3 labels, left to right.")),
            ...(buttons.length > 0 ? [row("Expected",

                    v => { a.ExpectedButton = v; updatePreview(); }),

            ...(() => {
                if (!Array.isArray(a.Slideshow)) a.Slideshow = [];
                // Normalize any legacy plain-string entries in-place before rendering
                a.Slideshow = a.Slideshow.map(normalizeSlide);

                }
                const mode = a._mediaMode;

                function switchDlgMode(val) {

                    else if (val === "video")     { a.Slideshow = []; }
                    a._mediaMode = val;
                    updatePreview(); reopenStep();
                }

                // Segmented media picker
                const mediaModes = [["off", "None"], ["slideshow", "Slideshow"], ["video", "Video"]];
                const mediaPicker = h("div", { style: "display:inline-flex;border-radius:7px;overflow:hidden;border:1px solid #d1d1d6" },
                    ...mediaModes.map(([val, label], idx) =>
                        h("button", {
                            class: "btn" + (mode === val ? " btn--active" : ""),
                            style: "border-radius:0;border:none;" + (idx < mediaModes.length - 1 ? "border-right:1px solid #d1d1d6;" : ""),

                if (a.Slideshow.length === 0)

                a.Slideshow.forEach((slide, i) => {

function conditionFields(c) {
    switch (c.Type) {
        case "shell":
            return [
                row("Command",
                    h("textarea", { oninput: e => { c.Command = e.target.value; updatePreview(); } }, c.Command || ""),
                    hint("Exit 0 = pass.")),
                row("Timeout (s)", intInput(c.TimeoutSeconds, v => c.TimeoutSeconds = v, "15"))
            ];
        case "app_installed":
            return [
                row("Bundle ID", textInput(c.BundleId, v => c.BundleId = v, "com.google.Chrome")),
                row("Path",      textInput(c.Path, v => c.Path = v, "(optional override)")),
                row("Min version", textInput(c.MinVersion, v => c.MinVersion = v, "120.0")),
                hint("Supply either Bundle ID (preferred) or Path.")
            ];
        case "default_browser":
            return [
                row("Bundle ID", textInput(c.BundleId, v => c.BundleId = v, "com.google.Chrome")),
                hint("Passes when this bundle ID owns the http/https scheme in LaunchServices for the logged-in user.")
            ];
        case "file_exists":
            return [
                row("Path", textInput(c.Path, v => c.Path = v, "/Library/Foo/bar")),
                row("Kind", selectInput(c.Kind || "any", FILE_KINDS, v => c.Kind = v),
                    hint("file — must be a regular file. directory — must be a folder. any — either."))
            ];
        case "profile_installed":
            return [
                row("Identifier", textInput(c.Identifier, v => c.Identifier = v, "com.example.wifi")),
                hint("Matches against the PayloadIdentifier field shown in: profiles list -all")
            ];
        case "process_running":
            return [
                row("Name", textInput(c.Name, v => c.Name = v, "Zscaler"),
                    hint("Matched with pgrep -x — exact process name, not the path.")),
                row("Minimum count", intInput(c.MinimumCount, v => c.MinimumCount = v, "1"),
                    hint("Number of matching processes that must be running. Default is 1."))
            ];
    }
    return [];
}


// ============================================================================
// Misc helpers + preview + download
// ============================================================================

function move(arr, i, dir) {
    const j = i + dir;
    if (j < 0 || j >= arr.length) return;
    [arr[i], arr[j]] = [arr[j], arr[i]];
    updatePreview();
}

function updatePreview() {
    const el = document.getElementById("preview");
    const status = document.getElementById("preview-status");
    try {
        const xml = serializeMobileconfig(state);
        el.textContent = xml;
        const doc = new DOMParser().parseFromString(xml, "application/xml");
        if (doc.querySelector("parsererror")) throw new Error("XML parse error");
        status.textContent = "valid";
        status.classList.remove("error");
    } catch (e) {
        el.textContent = `Serialization error: ${e.message}`;
        status.textContent = "error";
        status.classList.add("error");
    }
}

function triggerDownload(xml, fname, mime) {
    const blob = new Blob([xml], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
}

function downloadMobileconfig() {
    const base = state.outer.PayloadIdentifier || "enrollinator";
    triggerDownload(serializeMobileconfig(state), base + ".mobileconfig",
                    "application/x-apple-aspen-config");
}

function downloadBareXml() {
    const base = state.outer.PayloadIdentifier || "enrollinator";
    triggerDownload(serializeBareXml(state), base + ".plist", "application/xml");
}

function toggleDownloadMenu(btn) {
    const existing = document.getElementById("download-menu");
    if (existing) { existing.remove(); return; }

    const rect = btn.getBoundingClientRect();
    const menu = document.createElement("div");
    menu.id = "download-menu";
    menu.className = "header-dropdown-menu";
    menu.style.cssText = `top:${rect.bottom + 4}px;right:${document.documentElement.clientWidth - rect.right}px`;

    const items = [
        { label: "Download .mobileconfig", hint: "Deploy via MDM", action: downloadMobileconfig },
        { label: "Download as .plist (--xml)", hint: "Use with enrollinator.sh --xml", action: downloadBareXml }
    ];
    items.forEach(item => {
        const el = document.createElement("button");
        el.className = "header-dropdown-item";
        el.innerHTML = `<span class="ddi-label">${item.label}</span><span class="ddi-hint">${item.hint}</span>`;
        el.addEventListener("click", () => { menu.remove(); item.action(); });
        menu.appendChild(el);
    });

    document.body.appendChild(menu);
    // Close on outside click
    setTimeout(() => document.addEventListener("click", function close(e) {
        if (!menu.contains(e.target) && e.target !== btn) { menu.remove(); }
        document.removeEventListener("click", close);
    }), 0);
}

// ============================================================================
// Tooltips — position:fixed so overflow:hidden ancestors can never clip them.
// ============================================================================

function initTooltips() {
    const tip = document.createElement("div");
    tip.className = "js-tooltip";
    document.body.appendChild(tip);

    let hideTimer = null;

    function show(target) {
        const text = target.dataset.tooltip;
        if (!text) return;
        clearTimeout(hideTimer);
        tip.textContent = text;
        tip.style.opacity = "0";
        tip.style.display = "block";

        const below = target.hasAttribute("data-tooltip-below");
        const r = target.getBoundingClientRect();
        const tw = tip.offsetWidth;
        const th = tip.offsetHeight;
        let left = r.left + r.width / 2 - tw / 2;
        let top  = below ? r.bottom + 7 : r.top - th - 7;

        // Keep within viewport horizontally.
        left = Math.max(6, Math.min(left, window.innerWidth - tw - 6));
        tip.style.left = left + "px";
        tip.style.top  = top  + "px";
        tip.style.opacity = "1";
    }

    function hide() {
        tip.style.opacity = "0";
        hideTimer = setTimeout(() => { tip.style.display = "none"; }, 130);
    }

    document.addEventListener("mouseover", e => {
        const t = e.target.closest("[data-tooltip]");
        if (t) show(t); else hide();
    });
    document.addEventListener("mouseout", e => {
        if (!e.target.closest("[data-tooltip]")) return;
        // Only hide when leaving the element entirely (not entering a child).
        if (!e.relatedTarget || !e.relatedTarget.closest("[data-tooltip]")) hide();
    });
    document.addEventListener("scroll", hide, true);
}

        body: "The right pane shows a live .mobileconfig preview. Click <strong>Download .mobileconfig</strong> when done, then deploy it via your MDM to enrol Macs."
    }
];

function showGettingStarted() {
    const existing = document.getElementById("gs-root");
    if (existing) { existing.remove(); return; }

    const root = document.createElement("div");
    root.id = "gs-root";

    const backdrop = document.createElement("div");
    backdrop.className = "gs-backdrop";
    backdrop.addEventListener("click", e => { if (e.target === backdrop) root.remove(); });

    const modal = document.createElement("div");
    modal.className = "gs-modal";

    // Header
    const header = document.createElement("div");
    header.className = "gs-header";
    header.innerHTML = `
        <h2>👋 Welcome to Profile Builder</h2>
        <p>Build Enrollinator <code>.mobileconfig</code> profiles visually — no XML required.</p>`;
    modal.appendChild(header);

    // Grid of cards
    const grid = document.createElement("div");
    grid.className = "gs-grid";
    GS_CARDS.forEach(c => {
        const card = document.createElement("div");
        card.className = "gs-card";
        card.innerHTML = `
            <div class="gs-card-icon">${c.icon}</div>
            <h3>${c.title}</h3>
            <p>${c.body}</p>`;
        grid.appendChild(card);
    });
    modal.appendChild(grid);

    // Footer
    const footer = document.createElement("div");
    footer.className = "gs-footer";
    const skipLabel = document.createElement("label");
    const skipCheck = document.createElement("input");
    skipCheck.type = "checkbox";
    skipCheck.id = "gs-skip";
    skipLabel.appendChild(skipCheck);
    skipLabel.appendChild(document.createTextNode(" Don't show again"));
    footer.appendChild(skipLabel);
    const doneBtn = document.createElement("button");
    doneBtn.className = "btn primary";
    doneBtn.style.cssText = "height:34px;padding:0 22px;font-size:13px";
    doneBtn.textContent = "Got it";
    doneBtn.addEventListener("click", () => {
        if (skipCheck.checked) localStorage.setItem("enrollinator-gs-seen", "1");
        root.remove();
    });
    footer.appendChild(doneBtn);
    modal.appendChild(footer);

    backdrop.appendChild(modal);
    root.appendChild(backdrop);
    document.body.appendChild(root);
}

document.getElementById("help-btn").addEventListener("click", showGettingStarted);

// Show on first visit.
if (!localStorage.getItem("enrollinator-gs-seen")) showGettingStarted();

renderCanvas();
updatePreview();

// ---- preview collapse toggle
(function() {
    const btn    = document.getElementById("preview-toggle");
    const pane   = document.getElementById("preview-pane");
    const handle = document.getElementById("resize-handle");
    const mainEl = document.querySelector("main");

    btn.addEventListener("click", e => {
        e.stopPropagation(); // don't trigger resize-handle mousedown
        const isCollapsed = pane.classList.toggle("collapsed");
        handle.classList.toggle("collapsed", isCollapsed);
        if (isCollapsed) {
            pane._savedCols = mainEl.style.gridTemplateColumns || "";
            mainEl.style.gridTemplateColumns = "1fr 5px 0px";
            btn.textContent = "‹";
            btn.setAttribute("data-tooltip", "Expand preview");
            btn.title = "Expand preview";
        } else {
            mainEl.style.gridTemplateColumns = pane._savedCols || "";
            btn.textContent = "›";
            btn.setAttribute("data-tooltip", "Collapse preview");
            btn.title = "Collapse preview";
        }
    });
})();

// ---- resize handle
(function() {
    const handle = document.getElementById("resize-handle");
    const mainEl = document.querySelector("main");
    let active = false, startX = 0, startW = 0;
    handle.addEventListener("mousedown", e => {
        if (handle.classList.contains("collapsed")) return;
        active = true;
        startX = e.clientX;
        startW = document.getElementById("canvas").getBoundingClientRect().width;
        handle.classList.add("resizing");
        document.body.style.cursor = "col-resize";
        document.body.style.userSelect = "none";
        e.preventDefault();
    });
    document.addEventListener("mousemove", e => {
        if (!active) return;
        const w = Math.max(320, Math.min(startW + (e.clientX - startX), window.innerWidth - 220));
        mainEl.style.gridTemplateColumns = `${w}px 5px 1fr`;
    });
    document.addEventListener("mouseup", () => {
        if (!active) return;
        active = false;
        handle.classList.remove("resizing");
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
    });
})();
</script>
</body>
</html>
